# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eslint-verify:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout the code
        uses: actions/checkout@main
      - uses: actions/setup-node@main
        with:
          node-version: 22.11
          cache: 'npm'
      - name: 🗂️ Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - run: npm ci
      - name: Lint the code
        run: npm run lint:verify

  prettier-verify:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout the code
        uses: actions/checkout@main
      - uses: actions/setup-node@main
        with:
          node-version: 22.11
          cache: 'npm'
      - name: 🗂️ Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - run: npm ci
      - name: Prettify the code
        run: npm run prettier:verify

  test:
    runs-on: ubuntu-latest
    needs: [eslint-verify, prettier-verify]

    steps:
      - uses: warchant/setup-sonar-scanner@master
      - name: 📂 Checkout the code
        uses: actions/checkout@main
      - uses: actions/setup-node@main
        with:
          node-version: 22.11
          cache: 'npm'
      - name: 🗂️ Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - run: npm ci
      - run: touch .env
      - name: Run all of the tests
        run: npm test

  # ============================================================
  # Dependabot auto-merge (consolidated — no separate workflow)
  # ============================================================

  dependabot_auto_merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [eslint-verify, prettier-verify, test]
    permissions:
      contents: write
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Auto-merge patch and minor updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
